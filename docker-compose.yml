services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinal
      POSTGRES_USER: sentinal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinal_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    network_mode: host

  engine:
    build: .
    runtime: nvidia
    environment:
      - DB_URL=postgresql+asyncpg://sentinal:${POSTGRES_PASSWORD:-sentinal_pass}@localhost/sentinal
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
    network_mode: host

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    network_mode: host
    # In network_mode: host, the dashboard (Nginx) will listen on port 80 by default.
    # To change this, you would need to modify dashboard/nginx.conf.

volumes:
  postgres_data:
