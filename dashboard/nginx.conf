server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — send all non-file requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the engine backend
    location /api/ {
        proxy_pass http://engine:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Proxy WebSocket to the engine backend
    location /ws/ {
        proxy_pass http://engine:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Serve snapshot images
    location /api/snapshots/ {
        proxy_pass http://engine:8000/api/snapshots/;
        proxy_set_header Host $host;
    }
}
